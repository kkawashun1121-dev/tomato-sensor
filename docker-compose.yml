services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tomato
      POSTGRES_USER: tomato
      POSTGRES_PASSWORD: tomato
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tomato -d tomato"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg://tomato:tomato@db:5432/tomato
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174
      - IMAGE_DIR=/app/data/images
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    ports:
      - "8001:8000"

volumes:
  pgdata: